<!DOCTYPE html>
<html>
<head>
    <title>Generate PWA Icons</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .icon-preview { margin: 20px 0; }
        canvas { border: 1px solid #ccc; margin: 10px; }
        button { padding: 10px 20px; background: #D4AF37; color: white; border: none; cursor: pointer; margin: 5px; }
        button:hover { background: #B8960C; }
        h2 { color: #333; }
        .instructions { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="instructions">
        <h2>วิธีสร้าง Icon สำหรับ PWA</h2>
        <p>1. คลิกปุ่ม "Generate Icons" ด้านล่าง</p>
        <p>2. คลิกขวาที่รูปแต่ละขนาด แล้วเลือก "Save image as..."</p>
        <p>3. บันทึกเป็น icon-192.png และ icon-512.png ตามลำดับ</p>
    </div>
    
    <button onclick="generateIcons()">Generate Icons</button>
    
    <div class="icon-preview">
        <h3>192x192</h3>
        <canvas id="canvas192" width="192" height="192"></canvas>
        <br>
        <a id="download192" download="icon-192.png">
            <button>Download 192x192</button>
        </a>
    </div>
    
    <div class="icon-preview">
        <h3>512x512</h3>
        <canvas id="canvas512" width="512" height="512"></canvas>
        <br>
        <a id="download512" download="icon-512.png">
            <button>Download 512x512</button>
        </a>
    </div>

    <script>
        function generateIcons() {
            generateIcon(192);
            generateIcon(512);
        }
        
        function generateIcon(size) {
            const canvas = document.getElementById('canvas' + size);
            const ctx = canvas.getContext('2d');
            const scale = size / 512;
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#FFD700');
            gradient.addColorStop(0.5, '#D4AF37');
            gradient.addColorStop(1, '#B8960C');
            
            // Rounded rectangle
            const radius = 80 * scale;
            ctx.beginPath();
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Text "888"
            ctx.fillStyle = 'white';
            ctx.font = `bold ${120 * scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('888', size / 2, size * 0.35);
            
            // Text "เด็ด"
            ctx.font = `bold ${70 * scale}px Arial`;
            ctx.fillText('เด็ด', size / 2, size * 0.62);
            
            // Decorative line
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillRect(size * 0.2, size * 0.78, size * 0.6, 8 * scale);
            
            // Set download link
            const link = document.getElementById('download' + size);
            link.href = canvas.toDataURL('image/png');
        }
        
        // Auto generate on load
        window.onload = generateIcons;
    </script>
</body>
</html>
